<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coşkun ERGAN — Elektrik-Elektronik Mühendisi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=JetBrains+Mono:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #08090d;
      --bg2:       #0d0f16;
      --surface:   #111420;
      --border:    #1e2236;
      --gold:      #c8a96e;
      --gold-dim:  #7a6240;
      --cyan:      #3ee6e6;
      --cyan-dim:  #1a6e6e;
      --red:       #e63e3e;
      --text:      #e8e4d8;
      --muted:     #6b6e82;
      --ff-title:  'Cinzel', serif;
      --ff-mono:   'JetBrains Mono', monospace;
      --ff-serif:  'Playfair Display', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--ff-mono); overflow-x: hidden; }

    /* Layout */
    .wrapper { position: relative; z-index: 2; }
    #hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; align-items: center; padding: 0 6rem; gap: 4rem; }
    
    /* Hero Right: Oscilloscope */
    .hero-right { position: relative; display: flex; align-items: center; justify-content: center; height: 540px; }
    #scope-canvas { width: 100%; height: 100%; border: 1px solid var(--border); background: #08090d; }
    .scope-freq { position: absolute; top: 1.2rem; right: 1.5rem; font-size: .65rem; color: var(--gold); }
  </style>
</head>
<body>

<div class="wrapper">
  <section id="hero">
    <div class="hero-left">
      <h1 class="hero-name">Coşkun <span>ERGAN</span></h1>
      <p class="hero-tagline">Gömülü sistemler ve donanım tasarımı üzerine odaklanmış elektrik-elektronik mühendisi.</p>	  
		<a href="https://github.com/coskunergan" target="_blank">github.com/coskunergan</a>	
    </div>
   
    <div class="hero-right">
      <canvas id="scope-canvas"></canvas>
      <div class="scope-freq">0 Hz</div>
    </div>
  </section>
</div>

<script>
  /* ── Hero Canvas: Circuit Oscilloscope ── */
  const sCanvas = document.getElementById('scope-canvas');
  const sctx = sCanvas.getContext('2d');
  const freqDisplay = document.querySelector('.scope-freq');

  let phase = 0;
  let noisePhase = 0;

  function resizeScope() {
    sCanvas.width = sCanvas.parentElement.offsetWidth;
    sCanvas.height = sCanvas.parentElement.offsetHeight;
  }
  window.addEventListener('resize', resizeScope);
  resizeScope();

  // Dalga tipi yardımcı fonksiyonu
  function waveVal(type, t) {
	if (type === 'square') return Math.sin(t) >= 0 ? 1 : -1;
	if (type === 'sawtooth') return 2 * ((t / (2 * Math.PI)) % 1) - 1; // Yeni eklenen
	return Math.sin(t); // sine
  }

  const waves = [
	{ freq: 1, amp: 0.15, color: '#c8a96e', lw: 2, type: 'sine' },
	{ freq: 2, amp: 0.08, color: '#3ee6e6', lw: 1, type: 'square' },
	{ freq: 3, amp: 0.05, color: '#e63e3e', lw: 1, type: 'sawtooth' }
  ];

  function drawScope() {
    const W = sCanvas.width;
    const H = sCanvas.height;

    sctx.clearRect(0, 0, W, H);

    // Izgara (Grid) çizimi
    sctx.strokeStyle = '#1e2236';
    sctx.lineWidth = 1;
    sctx.beginPath();
    for(let i=0; i<W; i+=W/10) { sctx.moveTo(i,0); sctx.lineTo(i,H); }
    for(let i=0; i<H; i+=H/6) { sctx.moveTo(0,i); sctx.lineTo(W,i); }
    sctx.stroke();

    waves.forEach(w => {
      sctx.beginPath();
      sctx.strokeStyle = w.color;
      sctx.lineWidth = w.lw;
      sctx.shadowColor = w.color;
      sctx.shadowBlur = w.lw >= 2 ? 8 : 4;

      let prevY = null;

      for (let x = 0; x < W; x++) {
        const t = (x / W) * Math.PI * 2 * 4 * w.freq + phase * w.freq;
        const noise = Math.sin(noisePhase * 2.7 + x * .03) * .012;
        const v = waveVal(w.type, t) + noise;
        const y = H/2 - v * H * w.amp;

        if (x === 0) {
          sctx.moveTo(x, y);
        } else {
          // Kare dalga geçişlerini (edge) dikey çizgilerle bağla
          if (w.type === 'square' && prevY !== null && Math.abs(prevY - y) > H * w.amp) {
            sctx.lineTo(x, y);
          }
          sctx.lineTo(x, y);
        }
        prevY = y;
      }
      sctx.stroke();
      sctx.shadowBlur = 0;
    });

    phase += .025;
    noisePhase += .008;

    // Frekans göstergesi animasyonu
    const hz = Math.round(50 + Math.sin(phase * .1) * 2);
    if(freqDisplay) freqDisplay.textContent = hz + ' Hz';

    requestAnimationFrame(drawScope);
  }

  drawScope();
</script>

</body>
</html>
