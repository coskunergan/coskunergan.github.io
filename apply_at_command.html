SEND COMMAND

<button class="at-cmd px-2 py-1.5 bg-input-dark hover:bg-gray-700 border border-gray-700 rounded text-[10px] font-mono text-gray-300 transition-colors" data-cmd="AT+COPS?">AT+COPS?</button>

</a>

<span class="material-symbols-outlined text-[24px]">wifi_tethering</span>
<span class="text-[10px] font-medium">Hotspot</span>

<a class="flex flex-col items-center gap-1 w-full text-gray-500 hover:text-gray-300 transition-colors" href="/ota.html">
<span class="material-symbols-outlined text-[24px]">system_update</span>
<span class="text-[10px] font-medium">OTA</span>
</a>

<span class="text-[10px] font-medium">More</span>
</a>

<script>
"use strict";

let lastResponse = "";
let waitingForResponse = false;

// Firebase URLs
const FIREBASE_REQUEST_URL = 'https://esp32s3-bc4de-default-rtdb.europe-west1.firebasedatabase.app/request.json';
const FIREBASE_ANSWER_URL = 'https://esp32s3-bc4de-default-rtdb.europe-west1.firebasedatabase.app/answer.json';

function el(id) { return document.getElementById(id); }

function setButtonState(waiting) {
    waitingForResponse = waiting;
    const btn = el('send-btn');
    
    if (waiting) {
        btn.disabled = true;
        btn.classList.add('opacity-50', 'cursor-not-allowed');
    } else {
        btn.disabled = false;
        btn.classList.remove('opacity-50', 'cursor-not-allowed');
    }
}

function getTimestamp() {
    const now = new Date();
    return now.toLocaleTimeString('en-US', { hour12: false }) + '.' + String(now.getMilliseconds()).padStart(3, '0');
}

function addLog(type, message) {
    const logContent = el('log-content');
    const timestamp = getTimestamp();
    let colorClass = type === 'tx' ? 'text-primary' : type === 'rx' ? 'text-emerald-400' : type === 'error' ? 'text-red-400' : 'text-gray-300';
    const line = document.createElement('div');
    line.className = 'mb-1 flex gap-2';
    line.innerHTML = `<span class="text-gray-600 shrink-0">[${timestamp}]</span><span class="${colorClass}">${message}</span>`;
    logContent.appendChild(line);
    el('log-container').scrollTop = el('log-container').scrollHeight;
}

async function sendCommandViaLocal(command) {
    try {
        const resp = await fetch(`/api/at_send?cmd=${encodeURIComponent(command)}`);
        const data = await resp.json();
        if (data.status === 'sent') {
            return { success: true };
        }
        return { success: false, error: data.error };
    } catch (e) {
        return { success: false, error: e.message };
    }
}

async function sendCommandViaFirebase(command) {
    const msgId = Date.now();
    const data = {
        msg_id: msgId,
        command: command,
        timestamp: msgId
    };
    
    try {
        const resp = await fetch(FIREBASE_REQUEST_URL, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        if (resp.ok) {
            return { success: true, msgId: msgId };
        }
        return { success: false, error: 'Mesage PUT failed' };
    } catch (e) {
        return { success: false, error: e.message };
    }
}

async function checkFirebaseResponse(msgId, maxAttempts = 20) {
    for (let i = 0; i < maxAttempts; i++) {
        try {
            const resp = await fetch(FIREBASE_ANSWER_URL);
            const data = await resp.json();
            if (data && data.msg_id === msgId && data.response) {
                return data.response;
            }
        } catch (e) {
            // Ignore errors, keep polling
        }
        await new Promise(r => setTimeout(r, 500));
    }
    return null;
}

async function sendCommand() {
    if (waitingForResponse) {
        addLog('error', 'Waiting for previous command response...');
        return;
    }
    
    const command = el('at-command').value.trim();
    if (!command) { addLog('error', 'Please enter a command'); return; }
    
    setButtonState(true);
    lastResponse = '';
    commandStartTime = Date.now();
    addLog('tx', command);
    
    // Önce local API dene
    let result = await sendCommandViaLocal(command);
    
    // Local başarısız olursa Firebase dene
    if (!result.success) {
        result = await sendCommandViaFirebase(command);
        
        if (!result.success) {
            addLog('error', 'Error: ' + result.error);
            setButtonState(false);
            return;
        }
        
        // Firebase yanıtını bekle
        addLog('info', 'Waiting for remote response...');
        const response = await checkFirebaseResponse(result.msgId);
        
        if (response) {
            addLog('rx', response);
            addLog('info', 'Command completed (via remote)');
        } else {
            addLog('error', 'Remote response timeout');
        }
        
        setButtonState(false);
        el('at-command').value = '';
        return;
    }
    
    // Local başarılıysa normal poll
    addLog('info', 'Waiting for response...');
    setTimeout(pollResponse, 500);
    
    el('at-command').value = '';
}

let pollTimeout = null;
let commandStartTime = null;
const COMMAND_TIMEOUT_MS = 10000;

async function pollResponse() {
    if (!waitingForResponse) return;
    
    // Timeout kontrolü
    if (commandStartTime && (Date.now() - commandStartTime > COMMAND_TIMEOUT_MS)) {
        addLog('error', 'Command timeout');
        commandStartTime = null;
        setButtonState(false);
        return;
    }
    
    try {
        const resp = await fetch('/api/at_response');
        const data = await resp.json();
        if (data.response && data.response.trim() !== '') {
            addLog('rx', data.response);
            addLog('info', 'Command completed');
            commandStartTime = null;
            setButtonState(false);
            return;
        }
    } catch (e) {
        addLog('error', 'Poll error: ' + e.message);
    }
    
    pollTimeout = setTimeout(pollResponse, 300);
}

document.querySelectorAll('.at-cmd').forEach(btn => {
    btn.addEventListener('click', function() {
        const cmd = this.getAttribute('data-cmd');
        el('at-command').value = cmd;
        el('at-command').focus();
    });
});

el('send-btn').addEventListener('click', sendCommand);
el('at-command').addEventListener('keydown', function(e) { if (e.key === 'Enter' && e.ctrlKey) sendCommand(); });
el('clear-log').addEventListener('click', function() { el('log-content').innerHTML = '<div class="text-gray-500 italic">Log cleared</div>'; });
</script>
